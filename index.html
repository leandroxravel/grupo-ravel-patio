<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Controle De Pátio Grupo Ravel</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-gray-100 min-h-screen flex flex-col"><div id="app" class="flex-grow"></div><footer class="p-4 text-center text-sm text-gray-600 border-t bg-white">Desenvolvido por Leandro Fernandes</footer><script>
const DB = { USERS: 'ravel_u', VEHICLES: 'ravel_v', PATIOS: 'ravel_p', MODELS: 'ravel_m', HIST: 'ravel_h' };
let currentUser = null;

function init() {
    let users = JSON.parse(localStorage.getItem(DB.USERS) || '[]');
    if (!users.find(u => u.username === 'Leandro')) {
        users.push({ username: 'Leandro', password: 'Ravel@2203rv', role: 'administrador', status: 'ativo' });
        localStorage.setItem(DB.USERS, JSON.stringify(users));
    }
    Object.values(DB).forEach(k => { if (k !== DB.USERS && !localStorage.getItem(k)) localStorage.setItem(k, '[]'); });
}

function render() {
    const app = document.getElementById('app');
    if (!currentUser) {
        app.innerHTML = `<div class="flex justify-center items-center h-screen"><form id="login-form" class="bg-white p-8 rounded-lg shadow-xl w-96"><h1 class="text-2xl font-bold mb-6 text-center text-blue-900">Controle De Pátio Grupo Ravel</h1><input id="u" type="text" placeholder="Usuário" class="w-full p-3 mb-4 border rounded" required><input id="p" type="password" placeholder="Senha" class="w-full p-3 mb-6 border rounded" required><button class="w-full bg-blue-700 text-white p-3 rounded font-bold">Entrar</button></form></div>`;
        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            const users = JSON.parse(localStorage.getItem(DB.USERS));
            const u = document.getElementById('u').value, p = document.getElementById('p').value;
            const user = users.find(x => x.username === u && x.password === p && x.status === 'ativo');
            if (user) { currentUser = user; render(); } else { alert('Acesso negado'); }
        };
    } else {
        app.innerHTML = `<nav class="bg-blue-900 text-white p-4 flex gap-4 flex-wrap">
            <span class="font-bold mr-4">Grupo Ravel</span>
            <button onclick="nav('dash')" class="hover:text-blue-200">Dashboard</button>
            <button onclick="nav('consulta')" class="hover:text-blue-200">Consulta</button>
            ${['administrador', 'operador'].includes(currentUser.role) ? '<button onclick="nav(\'movimentacao\')" class="hover:text-blue-200">Entrada/Saída</button>' : ''}
            ${currentUser.role === 'administrador' ? '<button onclick="nav(\'admin\')" class="hover:text-blue-200">Gestão</button>' : ''}
            <button class="ml-auto bg-red-700 px-3 py-1 rounded" onclick="currentUser=null;render()">Sair</button>
        </nav><main id="main" class="p-6"></main>`;
        nav('dash');
    }
}

function nav(page) {
    const main = document.getElementById('main');
    main.innerHTML = `<h2 class="text-2xl font-bold mb-4 capitalize">${page}</h2><div class="bg-white p-6 rounded shadow">Sistema operando: ${page}</div>`;
}

init();
render();
</script></body></html>
