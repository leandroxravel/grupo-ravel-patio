<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle De Pátio Grupo Ravel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex flex-col min-h-screen">
    <div id="app" class="flex-grow"></div>
    <footer class="p-4 text-center text-sm text-gray-600 bg-white border-t">
        Desenvolvido por Leandro Fernandes
    </footer>

    <script>
        const STORAGE_KEYS = {
            USERS: 'ravel_users',
            VEHICLES: 'ravel_vehicles',
            PATIOS: 'ravel_patios',
            MODELS: 'ravel_models',
            HISTORY: 'ravel_history'
        };

        let currentUser = null;

        function getFromLocalStorage(key) {
            return JSON.parse(localStorage.getItem(key) || '[]');
        }

        function saveToLocalStorage(key, data) {
            localStorage.setItem(key, JSON.stringify(data));
        }

        function initializeApp() {
            let users = getFromLocalStorage(STORAGE_KEYS.USERS);
            if (!users.find(u => u.username === 'Leandro')) {
                users.push({
                    id: Date.now(),
                    username: 'Leandro',
                    password: 'Ravel@2203rv',
                    role: 'administrador',
                    status: 'ativo'
                });
                saveToLocalStorage(STORAGE_KEYS.USERS, users);
            }
            Object.values(STORAGE_KEYS).forEach(key => {
                if (!localStorage.getItem(key)) {
                    saveToLocalStorage(key, []);
                }
            });
        }

        function renderUI() {
            const app = document.getElementById('app');
            if (!currentUser) {
                app.innerHTML = `
                    <div class="flex justify-center items-center h-screen">
                        <form id="loginForm" class="bg-white p-8 rounded-lg shadow-xl w-96">
                            <h1 class="text-2xl font-bold mb-6 text-center text-blue-900">Controle De Pátio Grupo Ravel</h1>
                            <input id="username" type="text" placeholder="Usuário" class="w-full p-3 mb-4 border rounded" required>
                            <input id="password" type="password" placeholder="Senha" class="w-full p-3 mb-6 border rounded" required>
                            <button type="submit" class="w-full bg-blue-700 text-white p-3 rounded font-bold">Entrar</button>
                        </form>
                    </div>
                `;
                document.getElementById('loginForm').onsubmit = (e) => {
                    e.preventDefault();
                    const users = getFromLocalStorage(STORAGE_KEYS.USERS);
                    const username = document.getElementById('username').value;
                    const password = document.getElementById('password').value;
                    const foundUser = users.find(u => u.username === username && u.password === password && u.status === 'ativo');
                    if (foundUser) {
                        currentUser = foundUser;
                        renderUI();
                    } else {
                        alert('Credenciais inválidas ou usuário inativo.');
                    }
                };
            } else {
                app.innerHTML = `
                    <nav class="bg-blue-900 text-white p-4 flex gap-4 flex-wrap">
                        <span class="font-bold mr-4">Grupo Ravel</span>
                        <button onclick="navigateTo('dashboard')" class="hover:text-blue-200">Dashboard</button>
                        <button onclick="navigateTo('consulta')" class="hover:text-blue-200">Consulta</button>
                        ${['administrador', 'operador'].includes(currentUser.role) ? '<button onclick="navigateTo(\'movimentacao\')" class="hover:text-blue-200">Entrada/Saída</button>' : ''}
                        ${currentUser.role === 'administrador' ? '<button onclick="navigateTo(\'cadastro\')" class="hover:text-blue-200">Cadastros</button><button onclick="navigateTo(\'usuarios\')" class="hover:text-blue-200">Gestão de Usuários</button>' : ''}
                        <button class="ml-auto bg-red-700 px-3 py-1 rounded" onclick="logout()">Sair</button>
                    </nav>
                    <main id="content-area" class="p-6"></main>
                `;
                navigateTo('dashboard'); // Default page after login
            }
        }

        function navigateTo(page) {
            const contentArea = document.getElementById('content-area');
            let pageTitle = '';
            let pageContent = '';

            switch(page) {
                case 'dashboard':
                    pageTitle = 'Dashboard';
                    const vehicles = getFromLocalStorage(STORAGE_KEYS.VEHICLES);
                    const patios = getFromLocalStorage(STORAGE_KEYS.PATIOS);
                    const totalVehicles = vehicles.filter(v => v.currentPatio).length;
                    const vehiclesByPatio = patios.map(p => ({ 
                        name: p.name,
                        count: vehicles.filter(v => v.currentPatio === p.name).length 
                    }));
                    pageContent = `
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            <div class="bg-blue-100 p-4 rounded shadow">Total de Veículos no Pátio: <span class="font-bold text-xl">${totalVehicles}</span></div>
                            ${vehiclesByPatio.map(p => `<div class="bg-green-100 p-4 rounded shadow">Pátio ${p.name}: <span class="font-bold text-xl">${p.count}</span></div>`).join('')}
                        </div>
                    `;
                    break;
                case 'consulta':
                    pageTitle = 'Consulta de Veículos e Histórico';
                    pageContent = `
                        <input type="text" id="searchChassi" placeholder="Buscar por Chassi" class="p-2 border rounded mb-4 w-full md:w-1/2">
                        <button onclick="searchVehicle()" class="bg-blue-600 text-white px-4 py-2 rounded ml-2">Buscar</button>
                        <div id="searchResult" class="mt-4"></div>
                    `;
                    break;
                case 'movimentacao':
                    if (!['administrador', 'operador'].includes(currentUser.role)) { alert('Acesso negado'); return; }
                    pageTitle = 'Entrada e Saída de Veículos';
                    const availablePatios = getFromLocalStorage(STORAGE_KEYS.PATIOS);
                    const availableModels = getFromLocalStorage(STORAGE_KEYS.MODELS);
                    pageContent = `
                        <h3 class="text-lg font-semibold mb-2">Registrar Entrada</h3>
                        <form id="entradaForm" class="mb-6 p-4 border rounded bg-gray-50">
                            <input type="text" id="entradaChassi" placeholder="Chassi" class="w-full p-2 border rounded mb-2" required>
                            <select id="entradaModelo" class="w-full p-2 border rounded mb-2" required>
                                <option value="">Selecione o Modelo</option>
                                ${availableModels.map(m => `<option value="${m.name}">${m.name}</option>`).join('')}
                            </select>
                            <select id="entradaPatio" class="w-full p-2 border rounded mb-2" required>
                                <option value="">Selecione o Pátio</option>
                                ${availablePatios.map(p => `<option value="${p.name}">${p.name}</option>`).join('')}
                            </select>
                            <textarea id="entradaObs" placeholder="Observações/Avarias" class="w-full p-2 border rounded mb-4"></textarea>
                            <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded">Registrar Entrada</button>
                        </form>

                        <h3 class="text-lg font-semibold mb-2">Registrar Saída</h3>
                        <form id="saidaForm" class="p-4 border rounded bg-gray-50">
                            <input type="text" id="saidaChassi" placeholder="Chassi" class="w-full p-2 border rounded mb-2" required>
                            <textarea id="saidaObs" placeholder="Observações/Avarias" class="w-full p-2 border rounded mb-4"></textarea>
                            <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded">Registrar Saída</button>
                        </form>
                    `;
                    break;
                case 'cadastro':
                    if (currentUser.role !== 'administrador') { alert('Acesso negado'); return; }
                    pageTitle = 'Cadastros';
                    pageContent = `
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div class="bg-gray-50 p-4 rounded shadow">
                                <h4 class="font-semibold mb-2">Cadastrar Modelo</h4>
                                <form id="addModelForm">
                                    <input type="text" id="newModelName" placeholder="Nome do Modelo" class="w-full p-2 border rounded mb-2" required>
                                    <button type="submit" class="bg-blue-600 text-white px-3 py-1 rounded">Adicionar Modelo</button>
                                </form>
                                <h5 class="font-medium mt-4">Modelos Existentes:</h5>
                                <ul id="modelList" class="mt-2 list-disc pl-5 text-sm"></ul>
                            </div>
                            <div class="bg-gray-50 p-4 rounded shadow">
                                <h4 class="font-semibold mb-2">Cadastrar Pátio</h4>
                                <form id="addPatioForm">
                                    <input type="text" id="newPatioName" placeholder="Nome do Pátio" class="w-full p-2 border rounded mb-2" required>
                                    <button type="submit" class="bg-blue-600 text-white px-3 py-1 rounded">Adicionar Pátio</button>
                                </form>
                                <h5 class="font-medium mt-4">Pátios Existentes:</h5>
                                <ul id="patioList" class="mt-2 list-disc pl-5 text-sm"></ul>
                            </div>
                            <div class="bg-gray-50 p-4 rounded shadow">
                                <h4 class="font-semibold mb-2">Veículos Cadastrados</h4>
                                <p class="text-sm">Veículos são cadastrados automaticamente na primeira entrada.</p>
                                <h5 class="font-medium mt-4">Veículos Existentes:</h5>
                                <ul id="vehicleList" class="mt-2 list-disc pl-5 text-sm"></ul>
                            </div>
                        </div>
                    `;
                    break;
                case 'usuarios':
                    if (currentUser.role !== 'administrador') { alert('Acesso negado'); return; }
                    pageTitle = 'Gestão de Usuários';
                    pageContent = `
                        <form id="userForm" class="mb-6 p-4 border rounded bg-gray-50">
                            <h3 class="font-semibold mb-2">Adicionar/Editar Usuário</h3>
                            <input type="hidden" id="userId">
                            <input type="text" id="userUsername" placeholder="Usuário" class="w-full p-2 border rounded mb-2" required>
                            <input type="password" id="userPassword" placeholder="Senha (deixe em branco para manter a atual)" class="w-full p-2 border rounded mb-2">
                            <select id="userProfile" class="w-full p-2 border rounded mb-2" required>
                                <option value="">Selecione o Perfil</option>
                                <option value="administrador">Administrador</option>
                                <option value="supervisor">Supervisor</option>
                                <option value="operador">Operador</option>
                            </select>
                            <label class="inline-flex items-center mt-2 mb-4">
                                <input type="checkbox" id="userStatus" class="form-checkbox">
                                <span class="ml-2">Ativo</span>
                            </label><br>
                            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">Salvar Usuário</button>
                            <button type="button" onclick="clearUserForm()" class="bg-gray-400 text-white px-4 py-2 rounded ml-2">Limpar</button>
                        </form>
                        <h3 class="font-semibold mb-2">Lista de Usuários</h3>
                        <div class="overflow-x-auto">
                            <table class="min-w-full bg-white border">
                                <thead>
                                    <tr>
                                        <th class="py-2 px-4 border-b">Usuário</th>
                                        <th class="py-2 px-4 border-b">Perfil</th>
                                        <th class="py-2 px-4 border-b">Status</th>
                                        <th class="py-2 px-4 border-b">Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="userTableBody"></tbody>
                            </table>
                        </div>
                    `;
                    break;
                default:
                    pageTitle = 'Página não encontrada';
                    pageContent = '<p>Erro 404: A página que você tentou acessar não existe.</p>';
            }
            contentArea.innerHTML = `<h2 class="text-2xl font-bold mb-4 capitalize">${pageTitle}</h2><div class="bg-white p-6 rounded shadow">${pageContent}</div>`;
            
            if (page === 'movimentacao') {
                document.getElementById('entradaForm').onsubmit = handleEntry;
                document.getElementById('saidaForm').onsubmit = handleExit;
            }
            if (page === 'cadastro') {
                loadModelsList();
                loadPatiosList();
                loadVehiclesList();
                document.getElementById('addModelForm').onsubmit = addModel;
                document.getElementById('addPatioForm').onsubmit = addPatio;
            }
            if (page === 'usuarios') {
                loadUsersTable();
                document.getElementById('userForm').onsubmit = saveUser;
            }
            if (page === 'consulta') {
                // no specific event listeners needed here yet, searchVehicle is called directly
            }
        }

        function logout() {
            currentUser = null;
            renderUI();
        }

        // --- Cadastro Functions ---
        function addModel(e) {
            e.preventDefault();
            const name = document.getElementById('newModelName').value.trim();
            if (!name) return;
            let models = getFromLocalStorage(STORAGE_KEYS.MODELS);
            if (models.some(m => m.name.toLowerCase() === name.toLowerCase())) { alert('Modelo já existe!'); return; }
            models.push({ id: Date.now(), name: name });
            saveToLocalStorage(STORAGE_KEYS.MODELS, models);
            document.getElementById('newModelName').value = '';
            loadModelsList();
            alert('Modelo adicionado com sucesso!');
            navigateTo('movimentacao'); // Refresh movimentacao page to update model dropdown
            navigateTo('cadastro');
        }

        function loadModelsList() {
            const models = getFromLocalStorage(STORAGE_KEYS.MODELS);
            document.getElementById('modelList').innerHTML = models.map(m => `<li>${m.name}</li>`).join('');
        }

        function addPatio(e) {
            e.preventDefault();
            const name = document.getElementById('newPatioName').value.trim();
            if (!name) return;
            let patios = getFromLocalStorage(STORAGE_KEYS.PATIOS);
            if (patios.some(p => p.name.toLowerCase() === name.toLowerCase())) { alert('Pátio já existe!'); return; }
            patios.push({ id: Date.now(), name: name });
            saveToLocalStorage(STORAGE_KEYS.PATIOS, patios);
            document.getElementById('newPatioName').value = '';
            loadPatiosList();
            alert('Pátio adicionado com sucesso!');
            navigateTo('movimentacao'); // Refresh movimentacao page to update patio dropdown
            navigateTo('cadastro');
        }

        function loadPatiosList() {
            const patios = getFromLocalStorage(STORAGE_KEYS.PATIOS);
            document.getElementById('patioList').innerHTML = patios.map(p => `<li>${p.name}</li>`).join('');
        }

        function loadVehiclesList() {
            const vehicles = getFromLocalStorage(STORAGE_KEYS.VEHICLES);
            document.getElementById('vehicleList').innerHTML = vehicles.map(v => `<li>${v.chassi} - ${v.model} (${v.currentPatio || 'Fora do pátio'})</li>`).join('');
        }

        // --- Movimentacao Functions ---
        function handleEntry(e) {
            e.preventDefault();
            const chassi = document.getElementById('entradaChassi').value.trim().toUpperCase();
            const model = document.getElementById('entradaModelo').value;
            const patio = document.getElementById('entradaPatio').value;
            const obs = document.getElementById('entradaObs').value.trim();

            if (!chassi || !model || !patio) { alert('Preencha todos os campos obrigatórios.'); return; }

            let vehicles = getFromLocalStorage(STORAGE_KEYS.VEHICLES);
            let vehicle = vehicles.find(v => v.chassi === chassi);

            if (vehicle && vehicle.currentPatio) { alert(`Veículo ${chassi} já está no pátio ${vehicle.currentPatio}.`); return; }

            if (!vehicle) {
                vehicle = { id: Date.now(), chassi, model, currentPatio: null };
                vehicles.push(vehicle);
            }
            
            vehicle.currentPatio = patio;
            saveToLocalStorage(STORAGE_KEYS.VEHICLES, vehicles);

            let history = getFromLocalStorage(STORAGE_KEYS.HISTORY);
            history.push({ type: 'entrada', chassi, model, patio, obs, timestamp: new Date().toLocaleString(), user: currentUser.username });
            saveToLocalStorage(STORAGE_KEYS.HISTORY, history);

            alert(`Veículo ${chassi} entrou no pátio ${patio}.`);
            document.getElementById('entradaForm').reset();
            loadVehiclesList(); // Update vehicles list in cadastro if on that page
            if (document.getElementById('content-area').innerHTML.includes('Dashboard')) navigateTo('dashboard');
        }

        function handleExit(e) {
            e.preventDefault();
            const chassi = document.getElementById('saidaChassi').value.trim().toUpperCase();
            const obs = document.getElementById('saidaObs').value.trim();

            if (!chassi) { alert('Informe o Chassi para registrar a saída.'); return; }

            let vehicles = getFromLocalStorage(STORAGE_KEYS.VEHICLES);
            let vehicle = vehicles.find(v => v.chassi === chassi);

            if (!vehicle) { alert(`Veículo ${chassi} não encontrado.`); return; }
            if (!vehicle.currentPatio) { alert(`Veículo ${chassi} não está em nenhum pátio registrado.`); return; }

            const previousPatio = vehicle.currentPatio;
            const vehicleModel = vehicle.model; // Store model for history
            vehicle.currentPatio = null;
            saveToLocalStorage(STORAGE_KEYS.VEHICLES, vehicles);

            let history = getFromLocalStorage(STORAGE_KEYS.HISTORY);
            history.push({ type: 'saida', chassi, model: vehicleModel, patio: previousPatio, obs, timestamp: new Date().toLocaleString(), user: currentUser.username });
            saveToLocalStorage(STORAGE_KEYS.HISTORY, history);

            alert(`Veículo ${chassi} saiu do pátio ${previousPatio}.`);
            document.getElementById('saidaForm').reset();
            loadVehiclesList();
            if (document.getElementById('content-area').innerHTML.includes('Dashboard')) navigateTo('dashboard');
        }

        // --- Consulta Functions ---
        function searchVehicle() {
            const chassi = document.getElementById('searchChassi').value.trim().toUpperCase();
            const searchResultDiv = document.getElementById('searchResult');
            searchResultDiv.innerHTML = '';

            if (!chassi) { searchResultDiv.innerHTML = '<p class="text-red-500">Por favor, digite um chassi para buscar.</p>'; return; }

            const vehicles = getFromLocalStorage(STORAGE_KEYS.VEHICLES);
            const vehicle = vehicles.find(v => v.chassi === chassi);

            if (!vehicle) { searchResultDiv.innerHTML = `<p class="text-red-500">Veículo com chassi ${chassi} não encontrado.</p>`; return; }

            const history = getFromLocalStorage(STORAGE_KEYS.HISTORY).filter(h => h.chassi === chassi);

            let detailsHtml = `
                <div class="bg-blue-50 p-4 rounded shadow mb-4">
                    <h4 class="font-bold text-lg mb-2">Detalhes do Veículo: ${vehicle.chassi}</h4>
                    <p><strong>Modelo:</strong> ${vehicle.model}</p>
                    <p><strong>Localização Atual:</strong> ${vehicle.currentPatio || 'Fora do Pátio'}</p>
                </div>
                <h4 class="font-bold text-lg mb-2">Histórico de Movimentação:</h4>
            `;

            if (history.length === 0) {
                detailsHtml += '<p>Nenhum histórico de movimentação encontrado para este veículo.</p>';
            } else {
                detailsHtml += `<div class="overflow-x-auto"><table class="min-w-full bg-white border">
                    <thead><tr><th class="py-2 px-4 border-b">Tipo</th><th class="py-2 px-4 border-b">Pátio</th><th class="py-2 px-4 border-b">Obs/Avarias</th><th class="py-2 px-4 border-b">Data/Hora</th><th class="py-2 px-4 border-b">Usuário</th></tr></thead>
                    <tbody>
                        ${history.map(h => `
                            <tr>
                                <td class="py-2 px-4 border-b">${h.type.toUpperCase()}</td>
                                <td class="py-2 px-4 border-b">${h.patio || 'N/A'}</td>
                                <td class="py-2 px-4 border-b">${h.obs || 'N/A'}</td>
                                <td class="py-2 px-4 border-b">${h.timestamp}</td>
                                <td class="py-2 px-4 border-b">${h.user}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table></div>`;
            }
            searchResultDiv.innerHTML = detailsHtml;
        }

        // --- User Management Functions ---
        function loadUsersTable() {
            const users = getFromLocalStorage(STORAGE_KEYS.USERS);
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td class="py-2 px-4 border-b">${user.username}</td>
                    <td class="py-2 px-4 border-b">${user.role}</td>
                    <td class="py-2 px-4 border-b">${user.status === 'ativo' ? 'Ativo' : 'Inativo'}</td>
                    <td class="py-2 px-4 border-b">
                        <button onclick="editUser('${user.id}')" class="bg-yellow-500 text-white px-2 py-1 rounded text-sm mr-1">Editar</button>
                        <button onclick="toggleUserStatus('${user.id}')" class="${user.status === 'ativo' ? 'bg-orange-500' : 'bg-green-500'} text-white px-2 py-1 rounded text-sm mr-1">${user.status === 'ativo' ? 'Desativar' : 'Ativar'}</button>
                        <button onclick="deleteUser('${user.id}')" class="bg-red-500 text-white px-2 py-1 rounded text-sm">Excluir</button>
                    </td>
                </tr>
            `).join('');
        }

        function saveUser(e) {
            e.preventDefault();
            const id = document.getElementById('userId').value;
            const username = document.getElementById('userUsername').value.trim();
            const password = document.getElementById('userPassword').value;
            const role = document.getElementById('userProfile').value;
            const status = document.getElementById('userStatus').checked ? 'ativo' : 'inativo';

            if (!username || !role) { alert('Usuário e Perfil são obrigatórios.'); return; }

            let users = getFromLocalStorage(STORAGE_KEYS.USERS);

            if (id) { // Editing existing user
                let userIndex = users.findIndex(u => u.id == id);
                if (userIndex !== -1) {
                    const originalUser = users[userIndex];

                    if (originalUser.username === 'Leandro' && role !== 'administrador') {
                        alert('Não é possível alterar o perfil do usuário Leandro.');
                        return;
                    }

                    // Check if another user with the same username exists (excluding current user)
                    if (users.some(u => u.username === username && u.id != id)) {
                        alert('Já existe um usuário com este nome.');
                        return;
                    }

                    users[userIndex].username = username;
                    if (password) users[userIndex].password = password;
                    // Prevent changing Leandro's role even if tried via form
                    if (originalUser.username !== 'Leandro') {
                        users[userIndex].role = role;
                    }
                    users[userIndex].status = status;
                    alert('Usuário atualizado com sucesso!');
                }
            } else { // Adding new user
                if (!password) { alert('A senha é obrigatória para novos usuários.'); return; }
                if (users.some(u => u.username === username)) { alert('Já existe um usuário com este nome.'); return; }
                users.push({ id: Date.now(), username, password, role, status });
                alert('Usuário adicionado com sucesso!');
            }
            saveToLocalStorage(STORAGE_KEYS.USERS, users);
            clearUserForm();
            loadUsersTable();
        }

        function editUser(id) {
            const users = getFromLocalStorage(STORAGE_KEYS.USERS);
            const user = users.find(u => u.id == id);
            if (user) {
                document.getElementById('userId').value = user.id;
                document.getElementById('userUsername').value = user.username;
                document.getElementById('userPassword').value = ''; // Don't show password
                document.getElementById('userProfile').value = user.role;
                document.getElementById('userStatus').checked = (user.status === 'ativo');
                // Disable role selection for Leandro
                document.getElementById('userProfile').disabled = (user.username === 'Leandro');
            }
        }

        function toggleUserStatus(id) {
            let users = getFromLocalStorage(STORAGE_KEYS.USERS);
            let userIndex = users.findIndex(u => u.id == id);
            if (userIndex === -1) return;

            const user = users[userIndex];

            if (user.username === 'Leandro') { alert('Não é possível desativar o usuário Leandro.'); return; }

            if (user.status === 'ativo' && user.role === 'administrador') {
                const activeAdmins = users.filter(u => u.role === 'administrador' && u.status === 'ativo' && u.id != user.id);
                if (activeAdmins.length === 0) {
                    alert('Não é possível desativar o último administrador ativo do sistema.');
                    return;
                }
            }
            user.status = user.status === 'ativo' ? 'inativo' : 'ativo';
            saveToLocalStorage(STORAGE_KEYS.USERS, users);
            loadUsersTable();
            alert(`Usuário ${user.username} foi ${user.status === 'ativo' ? 'ativado' : 'desativado'}.`);
        }

        function deleteUser(id) {
            let users = getFromLocalStorage(STORAGE_KEYS.USERS);
            let userToDelete = users.find(u => u.id == id);

            if (!userToDelete) return;

            if (userToDelete.username === 'Leandro') { alert('O usuário Leandro não pode ser excluído.'); return; }

            if (userToDelete.role === 'administrador') {
                const activeAdmins = users.filter(u => u.role === 'administrador' && u.status === 'ativo' && u.id != userToDelete.id);
                if (activeAdmins.length === 0) {
                    alert('Não é possível excluir o último administrador ativo do sistema.');
                    return;
                }
            }

            if (confirm(`Tem certeza que deseja excluir o usuário ${userToDelete.username}?`)) {
                users = users.filter(u => u.id != id);
                saveToLocalStorage(STORAGE_KEYS.USERS, users);
                loadUsersTable();
                alert('Usuário excluído com sucesso!');
            }
        }

        function clearUserForm() {
            document.getElementById('userId').value = '';
            document.getElementById('userUsername').value = '';
            document.getElementById('userPassword').value = '';
            document.getElementById('userProfile').value = '';
            document.getElementById('userStatus').checked = false;
            document.getElementById('userProfile').disabled = false;
        }

        // Initialize app and render UI on page load
        initializeApp();
        renderUI();
    </script>
</body>
</html>
